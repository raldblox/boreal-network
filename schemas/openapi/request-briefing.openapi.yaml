openapi: 3.1.0
info:
  title: Boreal Web Request Surface
  version: 1.0.0
  description: >
    First web-facing request surface for explicit Request draft creation,
    request-brief mutations, public-safe listing of open public requests,
    public solution projections, per-request agent action affordances, and
    actor-specific request action policy inside apps/web.
paths:
  /api/requests:
    get:
      summary: Get the active request draft for one chat thread or list public open requests.
      security:
        - {}
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Public request and public solution list reads are anonymous; chat-scoped draft and owner/private list reads require an account session or resolver bearer token.
      x-boreal-required-scopes:
        resolver:
          - requests:read_private
      x-boreal-scope-condition: Resolver scope is required only for owner/private reads, not for scope=public or scope=public_solutions.
      parameters:
        - in: query
          name: chatId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum:
              - public
              - public_solutions
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: starting_after
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: ending_before
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The current request draft or a public request pool page with request-level agent action affordances.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties: false
                    required:
                      - request
                    properties:
                      request:
                        oneOf:
                          - $ref: "#/components/schemas/WebRequestDraft"
                          - type: "null"
                  - type: object
                    additionalProperties: false
                    required:
                      - requests
                      - hasMore
                    properties:
                      requests:
                        type: array
                        items:
                          $ref: "#/components/schemas/WebPublicRequest"
                      hasMore:
                        type: boolean
    post:
      summary: Create an explicit draft Request for one chat thread.
      security:
        - BorealAccountSession: []
      x-boreal-auth-boundary: Account session only. Resolver bearer tokens do not create browser chat draft requests through this route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - chatId
              properties:
                chatId:
                  type: string
                  format: uuid
                visibility:
                  type: string
                  enum:
                    - private
                    - public
                preferredSupplyId:
                  type: string
                  format: uuid
                planningMode:
                  type: string
                  enum:
                    - assisted
                    - raw
                  default: assisted
                  description: Raw stores buyer text without LLM briefing, title or summary polish, body-derived keys, planner output, execution classification, assignment copy, or proof planning.
                rawBody:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  description: Buyer-authored body text for raw intake. It is stored as the request brief body without deriving title or summary fields.
      responses:
        "200":
          description: The newly created or existing request draft.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
    patch:
      summary: Save a draft Request projection or advance it into the canonical open state.
      security:
        - BorealAccountSession: []
      x-boreal-auth-boundary: Account session only. Opening a request still requires buyer-owned session approval.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - requestId
                - action
              properties:
                requestId:
                  type: string
                  format: uuid
                action:
                  type: string
                  enum:
                    - save_draft
                    - open_request
      responses:
        "200":
          description: The updated request draft.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
      description: >
        When the request is still in `draft`, the live request-object document
        may be edited through a safe request-input subset only. `save_draft` and
        `open_request` normalize that subset back into the durable `Request`.
        For owner-private Boreal-managed worker lanes, `open_request` may also
        asynchronously start one fulfillment after the request opens when
        `routing.preferredSupplyId` already pins an executable first-party supply.
        Once the request leaves `draft`, the full canonical request object is
        rendered read-only.
  /api/chats/{chatId}/messages/{messageId}/reusable-prompt/analyze:
    post:
      summary: Analyze one public or owned scratch-chat user message as a reusable prompt.
      security:
        - {}
        - BorealAccountSession: []
      x-boreal-auth-boundary: Public scratch-chat messages may be analyzed anonymously; private source chats require the owning account session.
      description: >
        Read-only deterministic analysis. The endpoint detects V1 variables such
        as bracketed examples and explicit placeholders, but does not create a
        request, debit credits, mutate chat, or publish artifacts.
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: messageId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deterministic reusable prompt analysis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebReusablePromptAnalysis"
        "400":
          description: Unsupported source message or non-scratch chat.
        "403":
          description: Private source chat is not owned by the viewer.
        "404":
          description: Source chat message not found.
  /api/chats/{chatId}/messages/{messageId}/reusable-prompt/runs:
    post:
      summary: Create a private chat fork from one reusable scratch-chat prompt.
      security:
        - BorealAccountSession: []
      x-boreal-auth-boundary: Account session only. This creates a private buyer chat fork and does not accept resolver bearer auth in the live route.
      description: >
        Validates required fields, creates or reuses one private scratch chat
        keyed by idempotency, stores source chat/message provenance on the
        forked user message, and runs the filled prompt without debiting
        credits. The source chat and message remain unchanged.
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: messageId
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebReusablePromptRunCreate"
      responses:
        "200":
          description: The created or idempotently replayed private chat fork.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebReusablePromptRunResponse"
        "400":
          description: Invalid inputs, missing required variables, quota limit, token limit, or idempotency conflict.
        "401":
          description: Authenticated buyer session required.
        "403":
          description: Private source chat is not owned by the viewer.
        "404":
          description: Source chat message not found.
  /api/requests/{id}/activity:
    get:
      summary: Get recent or cursor-resumed activity for one request room.
      security:
        - {}
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Public request activity may be read anonymously; owner/private activity requires an account session or resolver bearer token.
      x-boreal-required-scopes:
        resolver:
          - requests:read_activity
      x-boreal-scope-condition: Resolver scope is required only for owner/private activity reads.
      description: >
        Without after_sequence this returns the latest durable activity in
        newest-first order. With after_sequence it returns events with a higher
        request-local sequence in ascending replay order so agents can resume
        monitoring from a stable checkpoint without creating heartbeat events.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: after_sequence
          required: false
          schema:
            type: integer
            minimum: 0
          description: Return durable events with sequence greater than this checkpoint.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 40
      responses:
        "200":
          description: Request activity entries plus a monitor cursor envelope.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - activity
                  - cursor
                properties:
                  activity:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebRequestActivity"
                  cursor:
                    $ref: "#/components/schemas/WebRequestActivityCursor"
  /api/requests/{id}:
    get:
      summary: Get one request detail view for an owner or public responder runtime.
      security:
        - {}
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Public-safe request detail may be read anonymously; owner-private detail requires account session or resolver bearer auth.
      x-boreal-required-scopes:
        resolver:
          - requests:read_private
      x-boreal-scope-condition: Resolver scope is required only for owner/private detail reads.
      x-boreal-response-policy-field: agentActionPolicy
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Owner-full request detail or public-safe request detail plus actor-specific agent action policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebRequestDetailResponse"
    patch:
      summary: Set or clear one owner-scoped preferred supply on a private request.
      security:
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Owner-scoped request routing mutation through account session or approved resolver runtime.
      x-boreal-required-scopes:
        resolver:
          - requests:update_private
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebRequestRoutingMutation"
      responses:
        "200":
          description: The updated owner request detail.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
  /api/requests/{id}/commitments:
    post:
      summary: Propose one durable commitment on an open request.
      security:
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Authenticated responder or approved resolver runtime only.
      x-boreal-required-scopes:
        resolver:
          - commitments:propose
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebCommitmentCreate"
      responses:
        "200":
          description: The created or idempotently replayed commitment proposal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebCommitmentMutation"
  /api/commitments/{id}:
    patch:
      summary: Accept one durable commitment as the request owner.
      security:
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Request owner session or owner-approved resolver runtime only.
      x-boreal-required-scopes:
        resolver:
          - commitments:accept
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebCommitmentAction"
      responses:
        "200":
          description: The accepted or idempotently replayed commitment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebCommitmentMutation"
  /api/requests/{id}/fulfillments:
    post:
      summary: Create one durable fulfillment lane from an accepted commitment.
      security:
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Account session or approved resolver runtime. Public or cross-actor work still requires commitment gates.
      x-boreal-required-scopes:
        resolver:
          - fulfillments:create
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebFulfillmentCreate"
      responses:
        "200":
          description: The created or idempotently replayed fulfillment.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
  /api/requests/{id}/artifacts:
    post:
      summary: Publish one durable artifact on an open request.
      security:
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Account session or approved resolver runtime with an authorized request or fulfillment role.
      x-boreal-required-scopes:
        resolver:
          - artifacts:publish
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebArtifactCreate"
      responses:
        "200":
          description: The created or idempotently replayed artifact publication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebArtifactMutation"
  /api/fulfillments/{id}:
    get:
      summary: Get one fulfillment detail view for an owner, participant, or public responder runtime.
      security:
        - {}
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Public fulfillment detail may be read anonymously; private owner or participant detail requires account session or resolver bearer auth.
      x-boreal-required-scopes:
        resolver:
          - fulfillments:read
      x-boreal-scope-condition: Resolver scope is required only for non-public fulfillment reads.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: One fulfillment detail view.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
    patch:
      summary: Update one durable fulfillment lane.
      security:
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Account session or approved resolver runtime for the authorized fulfillment actor.
      x-boreal-required-scopes:
        resolver:
          - fulfillments:update
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebFulfillmentMutation"
      responses:
        "200":
          description: The updated or idempotently replayed fulfillment.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
  /api/fulfillments/{id}/retry:
    post:
      summary: Resume one blocked Boreal-managed fulfillment lane from the same request lane.
      security:
        - BorealAccountSession: []
        - ResolverBearer: []
      x-boreal-auth-boundary: Account session or approved resolver runtime for the authorized fulfillment actor.
      x-boreal-required-scopes:
        resolver:
          - fulfillments:update
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebFulfillmentRetry"
      responses:
        "200":
          description: The resumed or idempotently replayed fulfillment.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
webhooks:
  requestActivity:
    post:
      summary: Receive a signed request activity webhook.
      description: >
        Target push-notification profile for agent monitors. Polling
        `/api/requests/{id}/activity` with after_sequence is the live monitor
        lane today; this webhook profile defines the signed callback shape for
        future subscription delivery and receiver implementations.
      x-boreal-status: target_profile
      parameters:
        - in: header
          name: Boreal-Webhook-Id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Boreal-Webhook-Timestamp
          required: true
          schema:
            type: integer
            minimum: 1
          description: Unix timestamp in seconds.
        - in: header
          name: Boreal-Webhook-Signature
          required: true
          schema:
            type: string
            pattern: "^v1=[a-f0-9]{64}$"
          description: HMAC-SHA256 signature over the profile base string.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebRequestActivityWebhook"
      responses:
        "204":
          description: The receiver verified and processed or deduplicated the delivery.
        "400":
          description: Invalid payload, stale timestamp, invalid signature, or unauthorized monitor context.
components:
  securitySchemes:
    BorealAccountSession:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Browser account session managed by Auth.js. Deployments may use the secure cookie variant __Secure-authjs.session-token.
    ResolverBearer:
      type: http
      scheme: bearer
      bearerFormat: Boreal resolver access token
      description: Boreal-issued resolver access token from resolver device approval. Operation extensions list resolver scopes when live routes enforce them.
  schemas:
    WebReusablePromptField:
      type: object
      additionalProperties: false
      required:
        - key
        - label
        - type
        - required
        - token
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum:
            - text
            - date
            - number
        required:
          type: boolean
        token:
          type: string
        example:
          type: string
    WebReusablePromptAnalysis:
      type: object
      additionalProperties: false
      required:
        - profile
        - sourceText
        - templateText
        - fields
        - warnings
      properties:
        profile:
          type: string
          enum:
            - public_chat_prompt_reuse_v0
        sourceText:
          type: string
        templateText:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/WebReusablePromptField"
        warnings:
          type: array
          items:
            type: string
    WebReusablePromptRunCreate:
      type: object
      additionalProperties: false
      required:
        - inputValues
      properties:
        inputValues:
          type: object
          additionalProperties:
            type: string
        idempotencyKey:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
    WebReusablePromptRunProvenance:
      type: object
      additionalProperties: true
      required:
        - profile
        - sourceChatId
        - sourceMessageId
        - sourceChatVisibility
        - sourceChatTitle
        - sourceUserId
        - forkedByUserId
        - templateText
        - inputValues
        - fieldKeys
        - renderedPrompt
        - billingMode
        - runChatId
        - runUserMessageId
        - forkedAt
        - estimatedInputTokens
        - estimatedRunTokens
        - freeRunPolicy
      properties:
        profile:
          type: string
          enum:
            - public_chat_prompt_reuse_v0
        sourceChatId:
          type: string
          format: uuid
        sourceMessageId:
          type: string
          format: uuid
        sourceChatVisibility:
          type: string
          enum:
            - public
            - private
        sourceChatTitle:
          type: string
        sourceUserId:
          type: string
          format: uuid
        forkedByUserId:
          type: string
          format: uuid
        templateText:
          type: string
        inputValues:
          type: object
          additionalProperties:
            type: string
        fieldKeys:
          type: array
          items:
            type: string
        renderedPrompt:
          type: string
        billingMode:
          type: string
          enum:
            - free_chat
        runChatId:
          type: string
          format: uuid
        runUserMessageId:
          type: string
          format: uuid
        runAssistantMessageId:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        forkedAt:
          type: string
          format: date-time
        estimatedInputTokens:
          type: integer
          minimum: 1
        estimatedRunTokens:
          type: integer
          minimum: 1
        freeRunPolicy:
          type: object
          additionalProperties: false
          required:
            - windowStartAt
            - dailyChatLimit
            - dailyTokenLimit
            - maxInputTokens
            - maxOutputTokens
            - topUpEligible
          properties:
            windowStartAt:
              type: string
              format: date-time
            dailyChatLimit:
              type: integer
              minimum: 0
            dailyTokenLimit:
              type: integer
              minimum: 0
            maxInputTokens:
              type: integer
              minimum: 1
            maxOutputTokens:
              type: integer
              minimum: 1
            topUpEligible:
              type: boolean
    WebReusablePromptRunResponse:
      type: object
      additionalProperties: true
      required:
        - chatId
        - reusablePromptRun
      properties:
        chatId:
          type: string
          format: uuid
        reusablePromptRun:
          $ref: "#/components/schemas/WebReusablePromptRunProvenance"
    WebRequestDetailResponse:
      type: object
      additionalProperties: false
      required:
        - request
        - agentActionPolicy
        - agentActionCardHints
      properties:
        request:
          oneOf:
            - $ref: "#/components/schemas/WebRequestDraft"
            - $ref: "#/components/schemas/WebPublicRequest"
        agentActionPolicy:
          $ref: "#/components/schemas/WebRequestAgentActionPolicy"
        agentActionCardHints:
          $ref: "#/components/schemas/WebRequestAgentActionCardHintSet"
    WebRequestAgentActionPolicy:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - subject
        - actor
        - roleHint
        - decisions
      properties:
        schemaVersion:
          type: integer
          enum:
            - 1
        subject:
          type: object
          additionalProperties: false
          required:
            - type
            - id
            - status
            - visibility
          properties:
            type:
              type: string
              enum:
                - Request
            id:
              type: string
              format: uuid
            status:
              type: string
              enum:
                - draft
                - open
                - funding_required
                - funded
                - in_progress
                - waiting_for_owner
                - delivered
                - completed
                - cancelled
                - failed
            visibility:
              type: string
              enum:
                - private
                - public
        actor:
          type: object
          additionalProperties: false
          required:
            - kind
            - isOwner
          properties:
            kind:
              type: string
              enum:
                - anonymous
                - session
                - resolver
            isOwner:
              type: boolean
            userId:
              type: string
            scopes:
              type: array
              items:
                type: string
                enum:
                  - requests:read_public
                  - requests:read_private
                  - requests:read_activity
                  - requests:update_private
                  - supplies:read_private
                  - commitments:propose
                  - commitments:accept
                  - artifacts:publish
                  - fulfillments:read
                  - fulfillments:create
                  - fulfillments:update
        roleHint:
          type: string
          enum:
            - private_request
            - public_request
            - public_solution
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/WebRequestAgentActionPolicyDecision"
    WebRequestAgentActionPolicyDecision:
      type: object
      additionalProperties: false
      required:
        - id
