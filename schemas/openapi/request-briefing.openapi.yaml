openapi: 3.1.0
info:
  title: Boreal Web Request Surface
  version: 1.0.0
  description: >
    First web-facing request surface for explicit Request draft creation,
    request-brief mutations, and public-safe listing of open public requests
    inside apps/web.
paths:
  /api/requests:
    get:
      summary: Get the active request draft for one chat thread or list public open requests.
      parameters:
        - in: query
          name: chatId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum:
              - public
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: starting_after
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: ending_before
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The current request draft or a public request pool page.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties: false
                    required:
                      - request
                    properties:
                      request:
                        oneOf:
                          - $ref: "#/components/schemas/WebRequestDraft"
                          - type: "null"
                  - type: object
                    additionalProperties: false
                    required:
                      - requests
                      - hasMore
                    properties:
                      requests:
                        type: array
                        items:
                          $ref: "#/components/schemas/WebPublicRequest"
                      hasMore:
                        type: boolean
    post:
      summary: Create an explicit draft Request for one chat thread.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - chatId
              properties:
                chatId:
                  type: string
                  format: uuid
                visibility:
                  type: string
                  enum:
                    - private
                    - public
                preferredSupplyId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: The newly created or existing request draft.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
    patch:
      summary: Save a draft Request projection or advance it into the canonical open state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - requestId
                - action
              properties:
                requestId:
                  type: string
                  format: uuid
                action:
                  type: string
                  enum:
                    - save_draft
                    - open_request
      responses:
        "200":
          description: The updated request draft.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
      description: >
        When the request is still in `draft`, the live request-object document
        may be edited through a safe request-input subset only. `save_draft` and
        `open_request` normalize that subset back into the durable `Request`.
        For owner-private Boreal-managed worker lanes, `open_request` may also
        asynchronously start one fulfillment after the request opens when
        `routing.preferredSupplyId` already pins an executable first-party supply.
        Once the request leaves `draft`, the full canonical request object is
        rendered read-only.
  /api/requests/{id}/activity:
    get:
      summary: Get recent activity for one request room.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Recent request activity entries in newest-first order.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - activity
                properties:
                  activity:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebRequestActivity"
  /api/requests/{id}:
    get:
      summary: Get one request detail view for an owner or public responder runtime.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Owner-full request detail or public-safe request detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebRequestDetailResponse"
    patch:
      summary: Set or clear one owner-scoped preferred supply on a private request.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebRequestRoutingMutation"
      responses:
        "200":
          description: The updated owner request detail.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
  /api/requests/{id}/commitments:
    post:
      summary: Propose one durable commitment on an open request.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebCommitmentCreate"
      responses:
        "200":
          description: The created or idempotently replayed commitment proposal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebCommitmentMutation"
  /api/commitments/{id}:
    patch:
      summary: Accept one durable commitment as the request owner.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebCommitmentAction"
      responses:
        "200":
          description: The accepted or idempotently replayed commitment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebCommitmentMutation"
  /api/requests/{id}/fulfillments:
    post:
      summary: Create one durable fulfillment lane from an accepted commitment.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebFulfillmentCreate"
      responses:
        "200":
          description: The created or idempotently replayed fulfillment.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
  /api/requests/{id}/artifacts:
    post:
      summary: Publish one durable artifact on an open request.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebArtifactCreate"
      responses:
        "200":
          description: The created or idempotently replayed artifact publication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebArtifactMutation"
  /api/fulfillments/{id}:
    get:
      summary: Get one fulfillment detail view for an owner, participant, or public responder runtime.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: One fulfillment detail view.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
    patch:
      summary: Update one durable fulfillment lane.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebFulfillmentMutation"
      responses:
        "200":
          description: The updated or idempotently replayed fulfillment.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
  /api/fulfillments/{id}/retry:
    post:
      summary: Resume one blocked Boreal-managed fulfillment lane from the same request lane.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebFulfillmentRetry"
      responses:
        "200":
          description: The resumed or idempotently replayed fulfillment.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - fulfillment
                properties:
                  fulfillment:
                    $ref: "#/components/schemas/WebFulfillment"
components:
  schemas:
    WebRequestDetailResponse:
      type: object
      additionalProperties: false
      required:
        - request
      properties:
        request:
          oneOf:
            - $ref: "#/components/schemas/WebRequestDraft"
            - $ref: "#/components/schemas/WebPublicRequest"
    WebRequestActiveRefs:
      type: object
      additionalProperties: false
      properties:
        activeCommitmentId:
          type: string
          format: uuid
        activeFulfillmentId:
          type: string
          format: uuid
        latestArtifactId:
          type: string
          format: uuid
        latestTransactionId:
          type: string
          format: uuid
    WebRequestLatest:
      type: object
      additionalProperties: false
      properties:
        summary:
          type: string
        lastEventAt:
          type: string
          format: date-time
        lastActor:
          type: object
          additionalProperties: false
          properties:
            kind:
              type: string
              enum:
                - human
                - agent
                - tool
                - organization
                - runtime
            id:
              type: string
    WebRequestRouting:
      type: object
      additionalProperties: false
      properties:
        preferredSupplyId:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
    WebRequestRoutingMutation:
      type: object
      additionalProperties: false
      required:
        - routing
      properties:
        routing:
          $ref: "#/components/schemas/WebRequestRouting"
    WebRequestActivity:
      type: object
      additionalProperties: false
      required:
        - eventId
        - requestId
        - sequence
        - eventType
        - aggregateType
        - aggregateId
        - occurredAt
        - recordedAt
        - actor
        - summary
      properties:
        eventId:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
        sequence:
          type: integer
        eventType:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        recordedAt:
          type: string
          format: date-time
        actor:
          type: object
          additionalProperties: false
          required:
            - kind
            - id
          properties:
            kind:
              type: string
              enum:
                - human
                - agent
                - tool
                - organization
                - runtime
            id:
              type: string
        summary:
          type: string
        detail:
          type: string
        requestStatus:
          type: string
        commitment:
          type: object
          additionalProperties: true
        fulfillment:
          type: object
          additionalProperties: true
        artifact:
          $ref: "#/components/schemas/WebRequestActivityArtifact"
    WebActorRef:
      type: object
      additionalProperties: false
      required:
        - kind
        - id
      properties:
        kind:
          type: string
          enum:
            - human
            - agent
            - tool
            - organization
            - runtime
        id:
          type: string
        displayName:
          type: string
        handle:
          type: string
    WebCommitmentTerms:
      type: object
      additionalProperties: false
      required:
        - fundingRequired
        - amountMode
      properties:
        fundingRequired:
          type: boolean
        amountMode:
          type: string
          enum:
            - none
            - fixed
            - range
            - open
        currency:
          type: string
        fixedAmount:
          type: number
        minAmount:
          type: number
        maxAmount:
          type: number
        deliverableSummary:
          type: string
        paymentNotes:
          type: string
    WebCommitmentCreate:
      type: object
      additionalProperties: false
      required:
        - kind
        - summary
        - terms
      properties:
        kind:
          type: string
          enum:
            - quote
            - proposal
            - assignment
            - milestone
            - acceptance
        summary:
          type: string
        terms:
          $ref: "#/components/schemas/WebCommitmentTerms"
        idempotencyKey:
          type: string
          format: uuid
    WebCommitmentAction:
      type: object
      additionalProperties: false
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - accept
        idempotencyKey:
          type: string
          format: uuid
    WebCommitmentMutation:
      type: object
      additionalProperties: false
      required:
        - requestId
        - commitmentId
        - summary
        - status
        - terms
        - requestStatus
      properties:
        requestId:
          type: string
          format: uuid
        commitmentId:
          type: string
          format: uuid
        summary:
          type: string
        status:
          type: string
          enum:
            - proposed
            - accepted
            - rejected
            - expired
            - superseded
            - cancelled
        terms:
          $ref: "#/components/schemas/WebCommitmentTerms"
        requestStatus:
          type: string
    WebArtifactContainerDocument:
      type: object
      additionalProperties: false
      required:
        - kind
        - documentId
        - documentKind
      properties:
        kind:
          type: string
          enum:
            - document
        documentId:
          type: string
          format: uuid
        documentKind:
          type: string
          enum:
            - text
            - code
            - image
            - sheet
        mediaKind:
          type: string
          enum:
            - image
            - audio
            - video
            - pdf
            - binary
            - archive
            - other
        mimeType:
          type: string
        filename:
          type: string
        byteSize:
          type: integer
          minimum: 0
        sha256:
          type: string
        sourceUri:
          type: string
          format: uri
    WebArtifactContainerExternalRef:
      type: object
      additionalProperties: false
      required:
        - kind
        - uri
      properties:
        kind:
          type: string
          enum:
            - external_ref
        uri:
          type: string
          format: uri
        mediaKind:
          type: string
          enum:
            - image
            - audio
            - video
            - pdf
            - binary
            - archive
            - other
        mimeType:
          type: string
        filename:
          type: string
        byteSize:
          type: integer
          minimum: 0
        sha256:
          type: string
        previewDocumentId:
          type: string
          format: uuid
    WebArtifactContainerObjectRef:
      type: object
      additionalProperties: false
      required:
        - kind
        - objectKey
        - storageProvider
      properties:
        kind:
          type: string
          enum:
            - object_ref
        objectKey:
          type: string
        storageProvider:
          type: string
        storageBucket:
          type: string
        mediaKind:
          type: string
          enum:
            - image
            - audio
            - video
            - pdf
            - binary
            - archive
            - other
        mimeType:
          type: string
        filename:
          type: string
        byteSize:
          type: integer
          minimum: 0
        sha256:
          type: string
        previewDocumentId:
          type: string
          format: uuid
        sourceUri:
          type: string
          format: uri
    WebArtifactContainer:
      oneOf:
        - $ref: "#/components/schemas/WebArtifactContainerDocument"
        - $ref: "#/components/schemas/WebArtifactContainerExternalRef"
        - $ref: "#/components/schemas/WebArtifactContainerObjectRef"
    WebRequestActivityArtifact:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - title
        - container
      properties:
        id:
          type: string
          format: uuid
        fulfillmentId:
          type: string
          format: uuid
        stepId:
          type: string
        kind:
          type: string
          enum:
            - brief
            - plan
            - draft
            - file
            - media
            - delivery
            - evidence
            - receipt
            - signature
            - link
        title:
          type: string
        summary:
          type: string
        container:
          $ref: "#/components/schemas/WebArtifactContainer"
    WebArtifactCreate:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - artifactKind
            - title
            - content
          properties:
            artifactKind:
              type: string
              enum:
                - brief
                - plan
                - draft
                - file
                - media
                - delivery
                - evidence
                - receipt
                - signature
                - link
            documentKind:
              type: string
              enum:
                - text
                - code
                - image
                - sheet
            title:
              type: string
            summary:
              type: string
            content:
              type: string
            fulfillmentId:
              type: string
              format: uuid
            stepId:
              type: string
            idempotencyKey:
              type: string
              format: uuid
        - type: object
          additionalProperties: false
          required:
            - artifactKind
            - title
            - container
          properties:
            artifactKind:
              type: string
              enum:
                - brief
                - plan
                - draft
                - file
                - media
                - delivery
                - evidence
                - receipt
                - signature
                - link
            title:
              type: string
            summary:
              type: string
            container:
              oneOf:
                - $ref: "#/components/schemas/WebArtifactContainerExternalRef"
                - $ref: "#/components/schemas/WebArtifactContainerObjectRef"
            fulfillmentId:
              type: string
              format: uuid
            stepId:
              type: string
            idempotencyKey:
              type: string
              format: uuid
    WebArtifactMutation:
      type: object
      additionalProperties: false
      required:
        - requestId
        - artifactId
        - title
        - artifactKind
        - requestStatus
        - container
      properties:
        requestId:
          type: string
          format: uuid
        artifactId:
          type: string
          format: uuid
        fulfillmentId:
          type: string
          format: uuid
        stepId:
          type: string
        documentId:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        kind:
          type: string
          enum:
            - text
            - code
            - image
            - sheet
        container:
          $ref: "#/components/schemas/WebArtifactContainer"
        artifactKind:
          type: string
          enum:
            - brief
            - plan
            - draft
            - file
            - media
            - delivery
            - evidence
            - receipt
            - signature
            - link
        requestStatus:
          type: string
    WebFulfillmentStep:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - title
        - status
      properties:
        id:
          type: string
        kind:
          type: string
        title:
          type: string
        status:
          type: string
          enum:
            - todo
            - ready
            - active
            - blocked
            - done
            - cancelled
            - failed
        dependsOnStepIds:
          type: array
          items:
            type: string
        assignee:
          $ref: "#/components/schemas/WebActorRef"
        metadata:
          type: object
          additionalProperties: true
    WebFulfillment:
      type: object
      additionalProperties: false
      required:
        - id
        - key
        - requestId
        - status
        - lead
        - contributors
        - summary
        - artifactIds
        - steps
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        requestId:
          type: string
          format: uuid
        commitmentId:
          type: string
          format: uuid
          nullable: true
        supplyId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - planned
            - ready
            - active
            - blocked
            - delivered
            - accepted
            - cancelled
            - failed
        lead:
          $ref: "#/components/schemas/WebActorRef"
        contributors:
          type: array
          items:
            $ref: "#/components/schemas/WebActorRef"
        summary:
          type: string
        artifactIds:
          type: array
          items:
            type: string
            format: uuid
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WebFulfillmentStep"
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        plannedAt:
          type: string
          format: date-time
        readyAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        blockedAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
        failedAt:
          type: string
          format: date-time
    WebFulfillmentCreate:
      type: object
      additionalProperties: false
      required:
        - summary
      properties:
        commitmentId:
          type: string
          format: uuid
          nullable: true
        summary:
          type: string
        lead:
          $ref: "#/components/schemas/WebActorRef"
        contributors:
          type: array
          items:
            $ref: "#/components/schemas/WebActorRef"
        supplyId:
          type: string
          format: uuid
        initialStatus:
          type: string
          enum:
            - planned
            - ready
            - active
        metadata:
          type: object
          additionalProperties: true
        idempotencyKey:
          type: string
          format: uuid
    WebFulfillmentMutation:
      type: object
      additionalProperties: false
      required:
        - status
        - summary
      properties:
        status:
          type: string
          enum:
            - planned
            - ready
            - active
            - blocked
            - delivered
            - accepted
            - cancelled
            - failed
        summary:
          type: string
        contributors:
          type: array
          items:
            $ref: "#/components/schemas/WebActorRef"
        artifactIds:
          type: array
          items:
            type: string
            format: uuid
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WebFulfillmentStep"
          metadata:
            type: object
            additionalProperties: true
          idempotencyKey:
            type: string
            format: uuid
    WebFulfillmentRetry:
      type: object
      additionalProperties: false
      properties:
        idempotencyKey:
          type: string
          format: uuid
    WebPublicRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - key
        - status
        - visibility
        - brief
        - derived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        status:
          type: string
          enum:
            - open
        visibility:
          type: string
          enum:
            - public
        brief:
          type: object
          additionalProperties: false
          properties:
            title:
              type: string
            summary:
              type: string
            body:
              type: string
            constraints:
              type: object
              additionalProperties: true
            outputKinds:
