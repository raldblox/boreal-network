openapi: 3.1.0
info:
  title: Boreal Web Request Surface
  version: 1.0.0
  description: >
    First web-facing request surface for explicit Request draft creation,
    request-brief mutations, and public-safe listing of open public requests
    inside apps/web.
paths:
  /api/requests:
    get:
      summary: Get the active request draft for one chat thread or list public open requests.
      parameters:
        - in: query
          name: chatId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum:
              - public
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: starting_after
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: ending_before
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The current request draft or a public request pool page.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties: false
                    required:
                      - request
                    properties:
                      request:
                        oneOf:
                          - $ref: "#/components/schemas/WebRequestDraft"
                          - type: "null"
                  - type: object
                    additionalProperties: false
                    required:
                      - requests
                      - hasMore
                    properties:
                      requests:
                        type: array
                        items:
                          $ref: "#/components/schemas/WebPublicRequest"
                      hasMore:
                        type: boolean
    post:
      summary: Create an explicit draft Request for one chat thread.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - chatId
              properties:
                chatId:
                  type: string
                  format: uuid
                visibility:
                  type: string
                  enum:
                    - private
                    - public
      responses:
        "200":
          description: The newly created or existing request draft.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
    patch:
      summary: Save a draft Request projection or advance it into the canonical open state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - requestId
                - action
              properties:
                requestId:
                  type: string
                  format: uuid
                action:
                  type: string
                  enum:
                    - save_draft
                    - open_request
      responses:
        "200":
          description: The updated request draft.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                properties:
                  request:
                    $ref: "#/components/schemas/WebRequestDraft"
      description: >
        When the request is still in `draft`, the live request-object document
        may be edited through a safe request-input subset only. `save_draft` and
        `open_request` normalize that subset back into the durable `Request`.
        Once the request leaves `draft`, the full canonical request object is
        rendered read-only.
components:
  schemas:
    WebPublicRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - key
        - status
        - visibility
        - brief
        - derived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        status:
          type: string
          enum:
            - open
        visibility:
          type: string
          enum:
            - public
        brief:
          type: object
          additionalProperties: false
          properties:
            title:
              type: string
            summary:
              type: string
            body:
              type: string
            constraints:
              type: object
              additionalProperties: true
            outputKinds:
              type: array
              items:
                type: string
            tags:
              type: array
              items:
                type: string
        seeking:
          type: object
          additionalProperties: false
          properties:
            actorKinds:
              type: array
              items:
                type: string
                enum:
                  - human
                  - agent
                  - tool
                  - organization
                  - runtime
            supplyKinds:
              type: array
              items:
                type: string
            teamMode:
              type: string
            notes:
              type: string
        budget:
          oneOf:
            - type: "null"
            - type: object
              additionalProperties: false
              required:
                - mode
              properties:
                mode:
                  type: string
                  enum:
                    - none
                    - fixed
                    - range
                    - open
                currency:
                  type: string
                fixedAmount:
                  type: number
                minAmount:
                  type: number
                maxAmount:
                  type: number
                notes:
                  type: string
        deadline:
          oneOf:
            - type: "null"
            - type: object
              additionalProperties: false
              properties:
                targetAt:
                  type: string
                  format: date-time
                notes:
                  type: string
        derived:
          type: object
          additionalProperties: false
          required:
            - missingDetails
            - readiness
          properties:
            routeFamily:
              type: string
            executionKind:
              type: string
            paymentMode:
              type: string
            matchingMode:
              type: string
            missingDetails:
              type: array
              items:
                type: string
            readiness:
              type: object
              additionalProperties: false
              required:
                - state
                - summary
                - readyForOpen
                - readyForMatch
              properties:
                state:
                  type: string
                  enum:
                    - collecting_brief
                    - ready_to_open
                    - ready_to_match
                summary:
                  type: string
                readyForOpen:
                  type: boolean
                readyForMatch:
                  type: boolean
            routeSummary:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WebRequestDraft:
      type: object
      additionalProperties: false
      required:
        - id
        - chatId
        - documentId
        - key
        - status
        - visibility
        - createdById
        - ownerId
        - brief
        - derived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        chatId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        key:
          type: string
        status:
          type: string
          enum:
            - draft
            - open
            - funding_required
            - funded
            - in_progress
            - waiting_for_owner
            - delivered
            - completed
            - cancelled
            - failed
        visibility:
          type: string
          enum:
            - private
            - public
        createdById:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        brief:
          type: object
          additionalProperties: false
          properties:
            title:
              type: string
            summary:
              type: string
            body:
              type: string
            constraints:
              type: object
              additionalProperties: true
            outputKinds:
              type: array
              items:
                type: string
            tags:
              type: array
              items:
                type: string
        seeking:
          type: object
          additionalProperties: false
          properties:
            actorKinds:
              type: array
              items:
                type: string
                enum:
                  - human
                  - agent
                  - tool
                  - organization
                  - runtime
            supplyKinds:
              type: array
              items:
                type: string
            teamMode:
              type: string
            notes:
              type: string
        budget:
          oneOf:
            - type: "null"
            - type: object
              additionalProperties: false
              required:
                - mode
              properties:
                mode:
                  type: string
                  enum:
                    - none
                    - fixed
                    - range
                    - open
                currency:
                  type: string
                fixedAmount:
                  type: number
                minAmount:
                  type: number
                maxAmount:
                  type: number
                notes:
                  type: string
        deadline:
          oneOf:
            - type: "null"
            - type: object
              additionalProperties: false
              properties:
                targetAt:
                  type: string
                  format: date-time
                notes:
                  type: string
        derived:
          type: object
          additionalProperties: false
          required:
            - missingDetails
            - readiness
          properties:
            routeFamily:
              type: string
            executionKind:
              type: string
            paymentMode:
              type: string
            matchingMode:
              type: string
            candidatePool:
              type: array
              items:
                type: string
            missingDetails:
              type: array
              items:
                type: string
            readiness:
              type: object
              additionalProperties: false
              required:
                - state
                - summary
                - readyForOpen
                - readyForMatch
              properties:
                state:
                  type: string
                  enum:
                    - collecting_brief
                    - ready_to_open
                    - ready_to_match
                summary:
                  type: string
                readyForOpen:
                  type: boolean
                readyForMatch:
                  type: boolean
            routeSummary:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
