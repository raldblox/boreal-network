openapi: 3.1.0
info:
  title: Boreal Web Payment And Buyer Credit Surface
  version: 1.0.0
  description: >
    First account-scoped buyer credit and request transaction surface for
    first-party supply. Buyer credit remains a support ledger. Request funding
    remains attached to Transaction.
paths:
  /api/buyer-credits/account:
    get:
      summary: Read or create the authenticated account's first-party buyer credit account.
      responses:
        "200":
          description: Buyer credit account projection.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - account
                properties:
                  account:
                    $ref: "#/components/schemas/BuyerCreditAccount"
  /api/buyer-credits/ledger:
    get:
      summary: Read the authenticated account's buyer credit ledger entries.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Buyer credit account and ledger entries.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - account
                  - ledger
                properties:
                  account:
                    $ref: "#/components/schemas/BuyerCreditAccount"
                  ledger:
                    type: array
                    items:
                      $ref: "#/components/schemas/BuyerCreditLedgerEntry"
  /api/buyer-credits/topups:
    post:
      summary: Create a pending first-party buyer credit top-up.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - amount
                - fundingSource
              properties:
                amount:
                  $ref: "#/components/schemas/MoneyAmount"
                fundingSource:
                  type: string
                  enum:
                    - card_direct
                    - paypal_direct
                    - usdc_direct
                    - usdt_direct
                reference:
                  type:
                    - string
                    - "null"
                  maxLength: 200
                metadata:
                  $ref: "#/components/schemas/Metadata"
                idempotencyKey:
                  type:
                    - string
                    - "null"
                  format: uuid
                  description: Must match the Idempotency-Key header when both are provided.
      responses:
        "200":
          description: Pending ledger entry and updated credit account projection.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - account
                  - ledgerEntry
                properties:
                  account:
                    $ref: "#/components/schemas/BuyerCreditAccount"
                  ledgerEntry:
                    $ref: "#/components/schemas/BuyerCreditLedgerEntry"
  /api/buyer-credits/apply:
    post:
      summary: Apply buyer credit to one owned Request.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - requestId
                - amount
              properties:
                requestId:
                  type: string
                  format: uuid
                amount:
                  $ref: "#/components/schemas/MoneyAmount"
                idempotencyKey:
                  type:
                    - string
                    - "null"
                  format: uuid
      responses:
        "200":
          description: Updated request, request transaction, credit account, and ledger debit.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                  - transaction
                  - account
                  - ledgerEntry
                properties:
                  request:
                    type: object
                  transaction:
                    $ref: "#/components/schemas/RequestTransaction"
                  account:
                    $ref: "#/components/schemas/BuyerCreditAccount"
                  ledgerEntry:
                    $ref: "#/components/schemas/BuyerCreditLedgerEntry"
  /api/services/character-call-starter/checkout:
    post:
      summary: Create and fund the $1 Character Call Starter Request from first-party buyer credit.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - characterName
                - personalityNotes
              properties:
                characterName:
                  type: string
                  minLength: 1
                  maxLength: 80
                callGoal:
                  type: string
                  enum:
                    - personal_fun
                    - sales_demo
                    - practice_room
                    - education_host
                  default: personal_fun
                personalityNotes:
                  type: string
                  minLength: 1
                  maxLength: 2000
                referenceImageDescription:
                  type: string
                  maxLength: 1000
                allowedTopics:
                  type: string
                  maxLength: 1000
                blockedTopics:
                  type: string
                  maxLength: 1000
                firstMessage:
                  type: string
                  maxLength: 500
                idempotencyKey:
                  type:
                    - string
                    - "null"
                  format: uuid
      responses:
        "200":
          description: Funded request, selected supply, workflow pack projections, request transaction, and buyer-credit ledger debit.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                  - transaction
                  - account
                  - ledgerEntry
                  - chatId
                  - supply
                  - workflowPack
                  - workflowPackVersion
                  - fulfillmentBootstrap
                  - checkout
                properties:
                  request:
                    type: object
                  transaction:
                    $ref: "#/components/schemas/RequestTransaction"
                  account:
                    $ref: "#/components/schemas/BuyerCreditAccount"
                  ledgerEntry:
                    $ref: "#/components/schemas/BuyerCreditLedgerEntry"
                  chatId:
                    type: string
                    format: uuid
                  supply:
                    type:
                      - object
                      - "null"
                  workflowPack:
                    type:
                      - object
                      - "null"
                  workflowPackVersion:
                    type:
                      - object
                      - "null"
                  fulfillmentBootstrap:
                    type: object
                    additionalProperties: true
                  checkout:
                    type: object
                    additionalProperties: false
                    required:
                      - amount
                      - currency
                      - serviceFamilyKey
                      - servicePlanKey
                    properties:
                      amount:
                        type: string
                        const: "1.00"
                      currency:
                        type: string
                        const: USD
                      serviceFamilyKey:
                        type: string
                        const: character-call-starter
                      servicePlanKey:
                        type: string
                        const: starter-call
        "400":
          description: Invalid checkout body, inactive or insufficient buyer credit, or request readiness failure.
        "401":
          description: Session authentication required.
  /api/services/character-call-starter/session:
    post:
      summary: Launch one Runway realtime character session for an owned funded Character Call Starter request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - requestId
                - avatarId
              properties:
                requestId:
                  type: string
                  format: uuid
                fulfillmentId:
                  type: string
                  format: uuid
                  description: Optional explicit fulfillment lane. When provided, it must belong to the owned Character Call Starter request.
                avatarId:
                  type: string
                  minLength: 1
                  maxLength: 200
      responses:
        "200":
          description: Ephemeral one-time Runway realtime session credentials. Tokens must not be persisted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - sessionId
                  - requestId
                  - expiresInSeconds
                  - raw
                properties:
                  sessionId:
                    type: string
                  requestId:
                    type: string
                    format: uuid
                  fulfillmentId:
                    type:
                      - string
                      - "null"
                    format: uuid
                  serverUrl:
                    type: string
                  token:
                    type: string
                  roomName:
                    type: string
                  expiresInSeconds:
                    type: integer
                    const: 300
                  raw:
                    type: object
                    additionalProperties: true
        "400":
          description: Invalid request, unfunded request, mismatched fulfillment, terminal fulfillment failure, missing Runway API secret, or Runway session failure.
        "401":
          description: Session authentication required.
        "404":
          description: Request or fulfillment not found.
  /api/paypal/create-order:
    post:
      summary: Create a PayPal Checkout order for first-party buyer credit top-up.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - amount
              properties:
                amount:
                  $ref: "#/components/schemas/MoneyAmount"
                currency:
                  type: string
                  pattern: "^[A-Z]{3}$"
                  default: USD
                idempotencyKey:
                  type:
                    - string
                    - "null"
                  format: uuid
      responses:
        "200":
          description: Pending ledger entry plus PayPal order approval link.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - account
                  - ledgerEntry
                  - paypalOrderId
                  - approveUrl
                properties:
                  account:
                    $ref: "#/components/schemas/BuyerCreditAccount"
                  ledgerEntry:
                    $ref: "#/components/schemas/BuyerCreditLedgerEntry"
                  paypalOrderId:
                    type: string
                  approveUrl:
                    type: string
                    format: uri
  /api/paypal/capture:
    get:
      summary: Capture an approved PayPal order and settle the matching buyer-credit top-up.
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
        - in: query
          name: ledgerEntryId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "303":
          description: Redirects the authenticated buyer back to account credit surfaces.
  /api/paypal/webhook:
    post:
      summary: Verify and process PayPal payment webhooks for buyer-credit top-up settlement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook verified and acknowledged.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - received
                  - handled
                properties:
                  received:
                    type: boolean
                  handled:
                    type: string
        "400":
          description: Invalid payload or failed PayPal signature verification.
  /api/requests/{id}/transactions:
    get:
      summary: List request-attached transactions for one owned Request.
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Request transaction list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - transactions
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/RequestTransaction"
    post:
      summary: Record direct request funding from a processor or stablecoin source.
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - amount
                - fundingSource
              properties:
                amount:
                  $ref: "#/components/schemas/MoneyAmount"
                currency:
                  type: string
                  pattern: "^[A-Z]{3}$"
                  default: USD
                fundingSource:
                  type: string
                  enum:
                    - card_direct
                    - paypal_direct
                    - usdc_direct
                    - usdt_direct
                kind:
                  $ref: "#/components/schemas/TransactionKind"
                status:
                  $ref: "#/components/schemas/TransactionStatus"
                reference:
                  type:
                    - string
                    - "null"
                  maxLength: 200
                metadata:
                  $ref: "#/components/schemas/Metadata"
                idempotencyKey:
                  type:
                    - string
                    - "null"
                  format: uuid
      responses:
        "200":
          description: Updated request and request transaction.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - request
                  - transaction
                properties:
                  request:
                    type: object
                  transaction:
                    $ref: "#/components/schemas/RequestTransaction"
components:
  parameters:
    RequestId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      description: Optional UUID replay key for mutating payment routes. When the JSON body also carries idempotencyKey, both values must match.
      schema:
        type: string
        format: uuid
  schemas:
    MoneyAmount:
      oneOf:
        - type: string
          pattern: "^\\d+(?:\\.\\d{1,2})?$"
        - type: number
          exclusiveMinimum: 0
    Metadata:
      type:
        - object
        - "null"
      additionalProperties: true
    TransactionKind:
      type: string
      enum:
        - payment_requirement
        - authorization
        - verification
        - settlement
        - payout
        - refund
        - dispute
    TransactionStatus:
      type: string
      enum:
        - pending
        - authorized
        - verified
        - settled
        - payout_pending
        - paid_out
        - refunded
        - disputed
        - failed
    RequestTransaction:
      type: object
      additionalProperties: true
      required:
        - id
        - key
        - requestId
        - kind
        - status
        - currency
        - amount
        - payer
        - payee
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        requestId:
          type: string
          format: uuid
        commitmentId:
          type:
            - string
            - "null"
          format: uuid
        fulfillmentId:
          type:
            - string
            - "null"
          format: uuid
        kind:
          $ref: "#/components/schemas/TransactionKind"
        status:
          $ref: "#/components/schemas/TransactionStatus"
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        amount:
          type: string
        payer:
          type: object
        payee:
          type: object
        reference:
          type:
            - string
            - "null"
        metadata:
          $ref: "#/components/schemas/Metadata"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BuyerCreditAccount:
      type: object
      additionalProperties: true
      required:
        - id
        - ownerId
        - currency
        - status
        - availableBalance
        - pendingBalance
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        status:
          type: string
          enum:
            - active
            - paused
            - closed
        availableBalance:
          type: string
        pendingBalance:
          type: string
    BuyerCreditLedgerEntry:
      type: object
      additionalProperties: true
      required:
        - id
        - buyerCreditAccountId
        - kind
        - status
        - amount
        - currency
        - balanceAfter
      properties:
        id:
          type: string
          format: uuid
        buyerCreditAccountId:
          type: string
          format: uuid
        kind:
          type: string
          enum:
            - topup
            - grant
            - debit
            - refund_restore
            - adjustment
            - reversal
        status:
          type: string
          enum:
            - pending
            - verified
            - settled
            - failed
            - reversed
        amount:
          type: string
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        balanceAfter:
          type: string
