openapi: 3.1.0
info:
  title: Boreal Named Agents API
  version: 0.1.0
  description: |
    Preparation-only route contract for named in-house Boreal agents.
    These routes expose agent templates and prepare application packets without
    mutating Request, Commitment, Fulfillment, FulfillmentStep, Artifact,
    Transaction, or RequestEvent truth.
paths:
  /api/boreal-agents/{agentKey}:
    get:
      summary: Read a named Boreal agent template.
      operationId: getBorealAgentTemplate
      parameters:
        - $ref: "#/components/parameters/AgentKey"
      responses:
        "200":
          description: Agent template and explicit non-authority boundary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BorealAgentTemplateResponse"
        "404":
          description: Unknown named agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Prepare an application packet or scan request candidates for a named Boreal agent.
      operationId: prepareBorealAgentAction
      parameters:
        - $ref: "#/components/parameters/AgentKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/PrepareApplicationRequest"
                - $ref: "#/components/schemas/ScanRequestCandidatesRequest"
      responses:
        "200":
          description: Preparation-only application or scan result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PreparedAgentApplication"
                  - $ref: "#/components/schemas/AgentScanResult"
        "400":
          description: Invalid preparation input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown named agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    AgentKey:
      name: agentKey
      in: path
      required: true
      schema:
        type: string
        enum:
          - mira-video
          - tala-humanizer
  schemas:
    BorealAgentTemplateResponse:
      type: object
      required:
        - kind
        - template
        - authority
      properties:
        kind:
          const: boreal_agent_template
        template:
          $ref: "#/components/schemas/BorealAgentTemplate"
        authority:
          $ref: "#/components/schemas/NonAuthority"
    BorealAgentTemplate:
      type: object
      required:
        - agentKey
        - uniqueName
        - displayName
        - status
        - apiRoute
        - workerKey
        - framework
        - promotionGates
        - supplyBinding
        - modelBindings
        - toolBindings
        - qualificationTags
        - taskPipeline
      properties:
        agentKey:
          type: string
        uniqueName:
          type: string
        displayName:
          type: string
        status:
          enum:
            - live_template
            - target_template
        apiRoute:
          type: string
        workerKey:
          type: string
        framework:
          $ref: "#/components/schemas/AgentFramework"
        promotionGates:
          $ref: "#/components/schemas/AgentPromotionGates"
        supplyBinding:
          type: object
          required:
            - required
            - supplyKind
            - providerRef
          properties:
            required:
              const: true
            supplyKind:
              $ref: "#/components/schemas/BorealSupplyKind"
            providerRef:
              type: string
        modelBindings:
          type: array
          items:
            type: object
            required:
              - provider
              - purpose
              - env
              - models
            properties:
              provider:
                enum:
                  - openai
                  - runway
              purpose:
                type: string
              env:
                type: string
              models:
                type: array
                items:
                  type: string
        toolBindings:
          type: array
          items:
            type: string
        qualificationTags:
          type: object
          required:
            - actorKinds
            - supplyKinds
            - outputKinds
            - executionKinds
            - skipWhen
          properties:
            actorKinds:
              type: array
              items:
                $ref: "#/components/schemas/BorealActorKind"
            supplyKinds:
              type: array
              items:
                $ref: "#/components/schemas/BorealSupplyKind"
            outputKinds:
              type: array
              items:
                $ref: "#/components/schemas/BorealOutputKind"
            executionKinds:
              type: array
              items:
                $ref: "#/components/schemas/BorealRequestExecutionKind"
            skipWhen:
              type: array
              items:
                type: string
        taskPipeline:
          type: array
          items:
            $ref: "#/components/schemas/AgentTaskStep"
    AgentFramework:
      type: object
      required:
        - id
        - version
        - routePattern
        - routeMode
        - supportedActions
        - boilerplateFiles
        - taskPipelineRules
        - nonAuthority
      properties:
        id:
          const: boreal_named_agent_v1
        version:
          const: 1
        routePattern:
          const: /api/boreal-agents/{agentKey}
        routeMode:
          const: preparation_only
        supportedActions:
          type: array
          items:
            enum:
              - read_template
              - scan_request_candidates
              - prepare_application
        boilerplateFiles:
          type: array
          items:
            type: string
        taskPipelineRules:
          type: array
          items:
            type: string
        nonAuthority:
          type: array
          items:
            enum:
              - no_matching_or_assignment
              - no_commitment_created
              - no_fulfillment_started
              - no_provider_call
              - no_artifact_published
              - no_payment_authorized
              - no_completion_claim
    BorealActorKind:
      type: string
      enum:
        - human
        - agent
        - tool
        - organization
        - runtime
    BorealSupplyKind:
      type: string
      enum:
        - agent_worker
        - ai_automation
        - automation_builder
        - desktop_runtime
        - digital_product
        - documentation_support
        - field_inspection
        - field_verification
        - generalist
        - hardware_ops
        - human_service
        - local_runner
        - migration_lead
        - operations_build
        - operations_support
        - operator
        - pickup_dropoff
        - provider_capability
        - qa_documentation
        - reporting_support
        - runtime_executor
        - team_service
        - video_generation
    BorealOutputKind:
      type: string
      enum:
        - automation_build
        - delivery
        - delivery_confirmation
        - draft
        - file
        - handoff_doc
        - handoff_receipt
        - inspection_report
        - issue_log
        - media
        - migration_plan
        - operator_training
        - photo_evidence
        - serial_inventory
        - signature
        - verification_note
        - video
        - workflow_build
        - workflow_map
    BorealRequestExecutionKind:
      type: string
      enum:
        - instant_delivery
        - hybrid_tool_room
        - provider_api
        - local_runtime
        - hybrid_human_agent
        - human_request_room
        - agent_request_room
        - runtime_request_room
        - specialist_request_room
    AgentPromotionGates:
      type: object
      required:
        - state
        - requiredEvidence
        - evidenceRefs
        - openBlockers
        - rules
      properties:
        state:
          enum:
            - live_backed
            - target_blocked
        requiredEvidence:
          type: array
          items:
            enum:
              - supply_factory
              - execution_contract
              - proof_path
              - failure_fixtures
              - route_level_mutation_tests
        evidenceRefs:
          type: array
          items:
            type: object
            required:
              - kind
              - label
              - path
              - status
            properties:
              kind:
                enum:
                  - supply_factory
                  - execution_contract
                  - proof_path
                  - failure_fixtures
                  - route_level_mutation_tests
              label:
                type: string
              path:
                type: string
              status:
                enum:
                  - implemented
                  - tested
                  - missing
                  - target_required
        openBlockers:
          type: array
          items:
            type: string
        rules:
          type: array
          items:
            type: string
    AgentTaskStep:
      type: object
      required:
        - id
        - kind
        - summary
        - canonicalReads
        - canonicalWritesIfAuthorized
      properties:
        id:
          type: string
        kind:
          type: string
        summary:
          type: string
        canonicalReads:
          type: array
          items:
            type: string
        canonicalWritesIfAuthorized:
          type: array
          items:
            type: string
    PrepareApplicationRequest:
      type: object
      required:
        - action
        - request
      additionalProperties: false
      properties:
        action:
          const: prepare_application
        request:
          $ref: "#/components/schemas/RequestSummaryInput"
        supply:
          $ref: "#/components/schemas/SupplySummaryInput"
    ScanRequestCandidatesRequest:
      type: object
      required:
        - action
        - requests
      additionalProperties: false
      properties:
        action:
          const: scan_request_candidates
        requests:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/RequestSummaryInput"
        supply:
          $ref: "#/components/schemas/SupplySummaryInput"
        scanMode:
          enum:
            - public_request_pool
            - owner_approved_pool
    RequestSummaryInput:
      type: object
      required:
        - id
        - visibility
      additionalProperties: true
      properties:
        id:
          type: string
        visibility:
          enum:
            - public
            - private
        status:
          type: string
        brief:
          type: object
          additionalProperties: true
          properties:
            outputKinds:
              type: array
              items:
                type: string
            constraints:
              $ref: "#/components/schemas/RequestQualificationConstraints"
        seeking:
          type: object
          additionalProperties: true
          properties:
            actorKinds:
              type: array
              items:
                type: string
            supplyKinds:
              type: array
              items:
                type: string
            notes:
              type: string
        derived:
          type: object
          additionalProperties: true
          properties:
            executionKind:
              type:
                - string
                - "null"
            routeSummary:
              type:
                - string
                - "null"
            seeking:
              type: object
              additionalProperties: true
              properties:
                supplyKinds:
                  type: array
                  items:
                    type: string
            executionProfile:
              $ref: "#/components/schemas/RequestQualificationExecutionProfile"
            embodiedConstraintSet:
              $ref: "#/components/schemas/RequestQualificationEmbodiedConstraintSet"
            verificationPlan:
              $ref: "#/components/schemas/RequestQualificationVerificationPlan"
        routing:
          type: object
          additionalProperties: true
          properties:
            preferredSupplyId:
              type:
                - string
                - "null"
        ownerApproval:
          type: object
          additionalProperties: true
          properties:
            trustedWorkerAutoApproval:
              type: boolean
            allowedWorkerKeys:
              type: array
              items:
                type: string
            selectedSupplyId:
              type:
                - string
                - "null"
        constraints:
          $ref: "#/components/schemas/RequestQualificationConstraints"
    RequestQualificationConstraints:
      type: object
      additionalProperties: true
      properties:
        requiresHumanPresence:
          type: boolean
        requiresLocalAccess:
          type: boolean
        requiresVerifiedEvidence:
          type: boolean
        requiresFieldProof:
          type: boolean
        requiresPhysicalVerification:
          type: boolean
        requiresPickup:
          type: boolean
        requiresDropoff:
          type: boolean
        requiresDelivery:
          type: boolean
        requiresWitness:
          type: boolean
        verificationRequirements:
          type: array
          items:
            type: string
    RequestQualificationExecutionProfile:
      type: object
      additionalProperties: true
      properties:
        executionModes:
          type: array
          items:
            type: string
        requiresHumanPresence:
          type: boolean
        requiresLocalAccess:
          type: boolean
        requiresVerifiedEvidence:
          type: boolean
    RequestQualificationEmbodiedConstraintSet:
      type: object
      additionalProperties: true
      properties:
        executionModes:
          type: array
          items:
            type: string
        verificationRequirements:
          type: array
          items:
            type: string
        requiresHumanPresence:
          type: boolean
        requiresLocalAccess:
          type: boolean
        requiresVerifiedEvidence:
          type: boolean
        requiresWitness:
          type: boolean
    RequestQualificationVerificationPlan:
      type: object
      additionalProperties: true
      properties:
        requiredArtifactKinds:
          type: array
          items:
            type: string
        requiredEvidenceClaims:
          type: array
          items:
            type: string
        mustHaveLocationSignal:
          type: boolean
        mustHaveSignature:
          type: boolean
    SupplySummaryInput:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        kind:
          type: string
        status:
          type: string
        supplyKinds:
          type: array
          items:
            type: string
        outputKinds:
          type: array
          items:
            type: string
        capabilityTags:
          type: array
          items:
            type: string
        providerRef:
          type: string
    PreparedAgentApplication:
      type: object
      required:
        - kind
        - agent
        - request
        - qualification
        - scanner
        - applicationPacket
        - taskPipeline
        - nonAuthority
      properties:
        kind:
          const: prepared_agent_application
        agent:
          type: object
          additionalProperties: true
        request:
          type: object
          additionalProperties: true
        qualification:
          type: object
          required:
            - allowedToWake
            - reasons
            - rejectedBy
            - recommendedLane
          properties:
            allowedToWake:
              type: boolean
            reasons:
              type: array
              items:
                type: string
            rejectedBy:
              type: array
              items:
                type: string
            recommendedLane:
              type: string
            ownerPrivateAutoApproval:
              type: object
              required:
                - allowed
                - reasons
                - rejectedBy
                - selectedSupplyId
              properties:
                allowed:
                  type: boolean
                reasons:
                  type: array
                  items:
                    type: string
                rejectedBy:
                  type: array
                  items:
                    type: string
                selectedSupplyId:
                  type:
                    - string
                    - "null"
        scanner:
          type: object
          required:
            - canonicalReads
            - canonicalWrites
            - sideEffects
          properties:
            canonicalReads:
              type: array
              items:
                type: string
            canonicalWrites:
              type: array
              maxItems: 0
            sideEffects:
              type: array
              maxItems: 0
        applicationPacket:
          $ref: "#/components/schemas/ApplicationPacket"
        taskPipeline:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/AgentTaskStep"
              - type: object
                required:
                  - state
                properties:
                  state:
                    type: string
        nonAuthority:
          $ref: "#/components/schemas/NonAuthority"
    AgentScanResult:
      type: object
      required:
        - kind
        - agent
        - scan
        - candidates
        - scanner
        - nonAuthority
      properties:
        kind:
          const: boreal_agent_scan_result
        agent:
          type: object
          additionalProperties: true
        scan:
          type: object
          required:
            - mode
            - requestCount
            - wakeCount
            - skipCount
            - rankingMode
          properties:
            mode:
              type: string
            requestCount:
              type: integer
              minimum: 1
            wakeCount:
              type: integer
              minimum: 0
            skipCount:
              type: integer
              minimum: 0
            rankingMode:
              const: none_no_matching_or_assignment
        candidates:
          type: array
          items:
            type: object
            required:
              - scanOrder
              - request
              - allowedToWake
              - recommendedLane
              - reasons
              - rejectedBy
              - proposedCanonicalWritesIfAuthorized
              - applicationPacket
            properties:
              scanOrder:
                type: integer
                minimum: 1
              request:
                type: object
                additionalProperties: true
              allowedToWake:
                type: boolean
              recommendedLane:
                type: string
              reasons:
                type: array
                items:
                  type: string
              rejectedBy:
                type: array
                items:
                  type: string
              proposedCanonicalWritesIfAuthorized:
                type: array
                items:
                  type: string
              applicationPacket:
                oneOf:
                  - $ref: "#/components/schemas/ApplicationPacket"
                  - type: "null"
        scanner:
          type: object
          required:
            - canonicalReads
            - canonicalWrites
            - sideEffects
          properties:
            canonicalReads:
              type: array
              items:
                type: string
            canonicalWrites:
              type: array
              maxItems: 0
            sideEffects:
              type: array
              maxItems: 0
        nonAuthority:
          $ref: "#/components/schemas/NonAuthority"
    ApplicationPacket:
      type: object
      required:
        - requestId
        - agentKey
        - workerKey
        - supplyBinding
        - packetStatus
        - qualificationGate
        - durableWriteStatus
        - requiredNextAction
        - submissionPreflight
        - authorizedExecutionHandoff
        - mutationCall
        - proposedCanonicalWrites
        - proposedObject
        - ownerApprovalMode
      properties:
        requestId:
          type: string
        agentKey:
          type: string
        workerKey:
          type: string
        supplyBinding:
          type: object
          additionalProperties: true
        packetStatus:
          enum:
            - ready_for_submission_preflight
            - blocked_until_qualified
        qualificationGate:
          $ref: "#/components/schemas/QualificationGate"
        durableWriteStatus:
          const: not_created_prepare_only
        requiredNextAction:
          enum:
            - run_submission_preflight_before_authorized_mutation
            - fix_qualification_before_submission_preflight
        submissionPreflight:
          $ref: "#/components/schemas/SubmissionPreflight"
        authorizedExecutionHandoff:
          $ref: "#/components/schemas/AuthorizedExecutionHandoff"
        mutationCall:
          $ref: "#/components/schemas/PreparedMutationCall"
        proposedCanonicalWrites:
          type: array
          items:
            type: string
        proposedObject:
          enum:
            - Commitment
            - Fulfillment
        ownerApprovalMode:
          enum:
            - explicit_owner_acceptance_required
            - trusted_worker_auto_approval_required
    QualificationGate:
      type: object
      required:
        - status
        - allowedToWake
        - recommendedLaneWhenAllowed
        - canRunSubmissionPreflight
        - canAttemptMutationSketchBeforePreflight
        - blockedReasons
        - requiredBeforePreflight
        - nonAuthority
      properties:
        status:
          enum:
            - passed
            - blocked
        allowedToWake:
          type: boolean
        recommendedLaneWhenAllowed:
          enum:
            - public_or_cross_actor_commitment_application
            - owner_private_direct_worker_fulfillment
        canRunSubmissionPreflight:
          type: boolean
        canAttemptMutationSketchBeforePreflight:
          const: false
        blockedReasons:
          type: array
          items:
            type: string
        requiredBeforePreflight:
          type: array
          items:
            type: string
        nonAuthority:
          type: string
    AuthorizedExecutionHandoff:
      type: object
      required:
        - status
        - activationBoundary
        - providerCallsAllowedBeforeFulfillment
        - secretValuesIncluded
        - requiredCredentialRefs
        - taskSequence
        - requiredBeforeProviderRun
        - canonicalBoundary
        - nonAuthority
      properties:
        status:
          enum:
            - blocked_until_authorized_fulfillment_exists
            - target_only
        activationBoundary:
          enum:
            - accepted_commitment_then_fulfillment_route_success
            - owner_private_direct_fulfillment_route_success
        providerCallsAllowedBeforeFulfillment:
          const: false
        secretValuesIncluded:
          const: false
        requiredCredentialRefs:
          type: array
          items:
            type: object
            required:
              - provider
              - env
              - purpose
              - models
              - secretValueIncluded
            properties:
              provider:
                enum:
                  - openai
                  - runway
              env:
                type: string
              purpose:
                type: string
              models:
                type: array
                items:
                  type: string
              secretValueIncluded:
                const: false
        taskSequence:
          type: array
          items:
            type: object
            required:
              - id
              - kind
              - state
              - summary
              - canonicalReads
              - canonicalWritesIfAuthorized
              - toolRefs
            properties:
              id:
                type: string
              kind:
                type: string
              state:
                type: string
              summary:
                type: string
              canonicalReads:
                type: array
                items:
                  type: string
              canonicalWritesIfAuthorized:
                type: array
                items:
                  type: string
              toolRefs:
                type: array
                items:
                  type: string
        requiredBeforeProviderRun:
          type: array
          items:
            type: string
        canonicalBoundary:
          type: object
          required:
            - rootObject
            - executionTruthObject
            - stepTruthObject
            - artifactTruthObject
            - eventTruthObject
          properties:
            rootObject:
              const: Request
            executionTruthObject:
              const: Fulfillment
            stepTruthObject:
              const: FulfillmentStep
            artifactTruthObject:
              const: Artifact
            eventTruthObject:
              const: RequestEvent
        nonAuthority:
          type: string
    SubmissionPreflight:
      type: object
      required:
        - endpoint
        - actionId
        - requiredStatus
        - requiredBeforeMutation
        - requiredInput
        - preflightRequest
        - routePolicyRecheck
        - mustReadBeforeSubmit
        - forbiddenClaimsBeforeAuthorizedMutation
        - nonAuthority
      properties:
        endpoint:
          const: /agents/actions/preflight
        actionId:
          enum:
            - apply_to_request
            - create_owner_private_fulfillment
        requiredStatus:
          const: preflight_passed
        requiredBeforeMutation:
          const: true
        requiredInput:
          type: object
          required:
            - schemaVersion
            - requestId
            - representedActor
            - hasHumanApproval
            - hasIdempotencyKey
            - requestedScopes
            - payloadSummaryRequired
            - requestFit
          properties:
            schemaVersion:
              const: 1
            requestId:
              type: string
            representedActor:
              type: object
              required:
                - kind
                - reference
              properties:
                kind:
                  const: agent
                reference:
                  type: string
                  pattern: "^boreal-agent:"
            hasHumanApproval:
              const: true
            hasIdempotencyKey:
              const: true
            requestedScopes:
              type: array
              items:
                type: string
                enum:
                  - commitments:propose
                  - fulfillments:create
              minItems: 1
            payloadSummaryRequired:
              const: true
            requestFit:
              type: object
              required:
                - selectedSupplyId
                - selectedSupplyStatus
                - requestSupplyKinds
                - requestOutputKinds
                - selectedSupplyKinds
                - selectedOutputKinds
              properties:
                selectedSupplyId:
                  type: string
                selectedSupplyStatus:
                  enum:
                    - draft
                    - published
                    - paused
                    - retired
                requestSupplyKinds:
                  type: array
                  items:
                    type: string
                requestOutputKinds:
                  type: array
                  items:
                    type: string
                selectedSupplyKinds:
                  type: array
                  items:
                    type: string
                selectedOutputKinds:
                  type: array
                  items:
                    type: string
        preflightRequest:
          type: object
          required:
            - schemaVersion
            - actionId
            - requestId
            - representedActor
            - hasHumanApproval
            - hasIdempotencyKey
            - requestedScopes
            - payloadSummary
            - requestFit
          properties:
            schemaVersion:
              const: 1
            actionId:
              enum:
                - apply_to_request
                - create_owner_private_fulfillment
            requestId:
              type: string
            representedActor:
              type: object
              required:
                - kind
                - reference
              properties:
                kind:
                  const: agent
                reference:
                  type: string
                  pattern: "^boreal-agent:"
            hasHumanApproval:
              const: true
            hasIdempotencyKey:
              const: true
            requestedScopes:
              type: array
              items:
                type: string
                enum:
                  - commitments:propose
                  - fulfillments:create
              minItems: 1
            payloadSummary:
              type: string
            requestFit:
              type: object
              required:
                - selectedSupplyId
                - selectedSupplyStatus
                - requestSupplyKinds
                - requestOutputKinds
                - selectedSupplyKinds
                - selectedOutputKinds
              properties:
                selectedSupplyId:
                  type: string
                selectedSupplyStatus:
                  enum:
                    - draft
                    - published
                    - paused
                    - retired
                requestSupplyKinds:
                  type: array
                  items:
                    type: string
                requestOutputKinds:
                  type: array
                  items:
                    type: string
                selectedSupplyKinds:
                  type: array
                  items:
                    type: string
                selectedOutputKinds:
                  type: array
                  items:
                    type: string
        routePolicyRecheck:
          type: object
          required:
            - requestDetailRequired
            - agentActionPolicyRequired
            - selectedSupplyRequired
            - ownerPrivateAutoApprovalRequired
            - mutationScopeIfResolverBearer
          properties:
            requestDetailRequired:
              const: true
            agentActionPolicyRequired:
              const: true
            selectedSupplyRequired:
              type: boolean
            ownerPrivateAutoApprovalRequired:
              type: boolean
            mutationScopeIfResolverBearer:
              enum:
                - commitments:propose
                - fulfillments:create
        mustReadBeforeSubmit:
          type: array
          items:
            type: string
        forbiddenClaimsBeforeAuthorizedMutation:
          type: array
          items:
            type: string
        nonAuthority:
          type: string
    PreparedMutationCall:
      type: object
      required:
        - method
        - route
        - auth
        - requiredHeaders
        - body
        - nonAuthority
      properties:
        method:
          const: POST
        route:
          type: string
          pattern: "^/api/requests/[^/]+/(commitments|fulfillments)$"
        auth:
          type: string
        requiredHeaders:
          type: array
          items:
            type: string
          contains:
            const: Idempotency-Key
        body:
          oneOf:
            - $ref: "#/components/schemas/CommitmentMutationBody"
            - $ref: "#/components/schemas/FulfillmentMutationBody"
        nonAuthority:
          type: string
    CommitmentMutationBody:
      type: object
      required:
        - kind
        - summary
        - terms
      properties:
        kind:
          const: proposal
        supplyId:
          type: string
          format: uuid
          format: uuid
        summary:
          type: string
        terms:
          type: object
          required:
            - fundingRequired
            - amountMode
            - deliverableSummary
            - paymentNotes
          properties:
            fundingRequired:
              type: boolean
            amountMode:
              enum:
                - open
            deliverableSummary:
              type: string
            paymentNotes:
              type: string
    FulfillmentMutationBody:
      type: object
      required:
        - summary
        - lead
        - ownerPrivateDirectApproval
        - initialStatus
        - metadata
      properties:
        summary:
          type: string
        lead:
          type: object
          required:
            - kind
            - id
            - displayName
            - handle
          properties:
            kind:
              const: agent
            id:
              type: string
              pattern: "^boreal-agent:"
            displayName:
              type: string
            handle:
              type: string
        supplyId:
          type: string
        ownerPrivateDirectApproval:
          $ref: "#/components/schemas/OwnerPrivateDirectApproval"
        initialStatus:
          enum:
            - planned
        metadata:
          type: object
          additionalProperties: true
    OwnerPrivateDirectApproval:
      type: object
      additionalProperties: false
      required:
        - mode
        - approvedByOwner
        - selectedSupplyId
      properties:
        mode:
          const: trusted_worker_auto_approval
        approvedByOwner:
          const: true
        selectedSupplyId:
          type: string
          format: uuid
        workerKey:
          type: string
          description: Required when the selected Supply maps to a Boreal-managed worker.
    NonAuthority:
      type: object
      required:
        - canMutateRequest
        - canCreateCommitment
        - canCreateFulfillment
        - canCallProvider
      properties:
        canMutateRequest:
          const: false
        canCreateCommitment:
          const: false
        canCreateFulfillment:
          const: false
        canCallProvider:
          const: false
        canAssignWorker:
          const: false
        routeMode:
          type: string
        requiresSeparateAuthorizedMutation:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        knownAgents:
          type: array
          items:
            type: string
        issues:
          type: array
          items:
            type: object
            additionalProperties: true
